# expected context and target entries.

[test-config-verify.nixos]
check = "./check.sh"
serialize = "./serialize.sh"

[test-config-verify.home]
check = "./check.sh"
serialize = "./serialize.sh"

[test-config-verify.shared]
check = "./shared_check.sh"
serialize = "./shared_serialize.sh"